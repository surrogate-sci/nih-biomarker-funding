name: Update Datawrapper — Biomarker Funding

on:
  push:
    branches: [main]
    paths:
      - data/filtered/SUMMARY.md
      - scripts/plot_public_figures.py

jobs:
  update-datawrapper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pytest

      - name: Run tests
        env:
          DATAWRAPPER_API_TOKEN: ${{ secrets.DATAWRAPPER_API_TOKEN }}
        run: python -m pytest tests/test_plot_public_figures.py -v

      - name: Update Datawrapper and export PNGs
        env:
          DATAWRAPPER_API_TOKEN: ${{ secrets.DATAWRAPPER_API_TOKEN }}
        run: python scripts/plot_public_figures.py

      - name: Push PNGs to surrogate-sci/biomarker-funding
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh auth status

          REPO="surrogate-sci/biomarker-funding"

          push_png() {
            local src="$1"
            local dest="$2"
            local msg="$3"

            SHA=$(gh api repos/$REPO/contents/$dest --jq '.sha' 2>/dev/null || echo "")
            B64=$(base64 -w 0 "$src")

            if [ -n "$SHA" ]; then
              gh api --method PUT repos/$REPO/contents/$dest \
                --field message="$msg" \
                --field content="$B64" \
                --field sha="$SHA"
            else
              gh api --method PUT repos/$REPO/contents/$dest \
                --field message="$msg" \
                --field content="$B64"
            fi
          }

          push_png \
            visualizations/cumulative_biomarker_funding_nominal.png \
            data/fig-1/cumulative_biomarker_funding_nominal.png \
            "ci: update nominal cumulative funding figure"

          push_png \
            visualizations/cumulative_biomarker_funding_2024dollars.png \
            data/fig-1/cumulative_biomarker_funding_2024dollars.png \
            "ci: update inflation-adjusted cumulative funding figure"
